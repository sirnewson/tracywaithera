<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracy Waithera | Global Strategy & Branding</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts: Inter (Tracy), Outfit & Plus Jakarta (Trouve) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
    rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              navy: '#7c3aed', // Violet 600
              navyDark: '#4c1d95', // Violet 900
              purple: '#6D28D9',
              gold: '#FDB931',
              goldDeep: '#D49B00',
              goldBright: '#FFECB3',
              slate: '#475569'
            }
          },
          fontFamily: {
            // Prioritize Inter for Tracy, fallback to Plus Jakarta for Trouve if needed
            sans: ['Inter', 'Plus Jakarta Sans', 'sans-serif'],
            display: ['Outfit', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    /* Global Reset & Base */
    :root {
      --brand-gold: #FDB931;
      --brand-gold-deep: #D49B00;
    }

    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      background-color: #ffffff;
      color: #09090b;
      -webkit-font-smoothing: antialiased;
    }

    /* Tracy Waithera Styles */
    .gradient-text {
      background: linear-gradient(135deg, #ff6a00 0%, #b026ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-gradient {
      background: linear-gradient(90deg, #ff6a00 0%, #b026ff 100%);
    }

    .bg-magical {
      background: radial-gradient(circle at 50% 50%, rgba(255, 106, 0, 0.05) 0%, rgba(255, 255, 255, 1) 70%);
    }

    .bg-dark-magical {
      background: radial-gradient(circle at 50% 50%, rgba(176, 38, 255, 0.15) 0%, rgba(9, 9, 11, 1) 100%);
    }

    .pill-nav {
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 10px 30px -5px rgba(255, 106, 0, 0.3);
    }

    .splash-overlay {
      background: #ffffff;
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
    }

    .splash-overlay.hide {
      transform: translateY(-100%);
    }

    .netflix-scroll::-webkit-scrollbar {
      display: none;
    }

    .netflix-scroll {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    ::selection {
      background: #ff6a00;
      color: white;
    }

    /* Trouve Agency Styles (Preserved) */
    .ios-blur {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: saturate(180%) blur(25px);
      -webkit-backdrop-filter: saturate(180%) blur(25px);
    }

    .mesh-gradient {
      background-color: #FFFFFF;
      background-image:
        radial-gradient(at 0% 0%, rgba(253, 185, 49, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(109, 40, 217, 0.08) 0px, transparent 50%),
        radial-gradient(at 50% 100%, rgba(253, 185, 49, 0.1) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(30, 58, 138, 0.05) 0px, transparent 50%);
    }

    .btn-depth {
      position: relative;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 0 rgba(0, 0, 0, 0.1), 0 12px 24px -8px rgba(0, 0, 0, 0.15);
    }

    .btn-depth:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 0 rgba(0, 0, 0, 0.1), 0 20px 30px -10px rgba(0, 0, 0, 0.2);
    }

    .btn-depth:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 0 rgba(0, 0, 0, 0.1), 0 4px 8px -2px rgba(0, 0, 0, 0.1);
    }

    .btn-gold-gloss {
      background: linear-gradient(180deg, #FDB931 0%, #F59E0B 100%);
      border: 1px solid #D49B00;
      box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.4), 0 4px 0 0 #D49B00, 0 12px 32px -8px rgba(253, 185, 49, 0.5);
    }

    .btn-gold-gloss:hover {
      background: linear-gradient(180deg, #FFC552 0%, #FDB931 100%);
      box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.5), 0 6px 0 0 #D49B00, 0 20px 40px -12px rgba(253, 185, 49, 0.6);
    }

    .btn-gold-gloss:active {
      transform: translateY(3px);
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.1), 0 1px 0 0 #D49B00, 0 4px 8px -2px rgba(253, 185, 49, 0.3);
    }

    .gold-pop-gradient {
      background: linear-gradient(135deg, #FDB931 0%, #FFB800 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .gold-bg-gradient {
      background: linear-gradient(135deg, #FDB931 0%, #FFB800 100%);
    }

    @keyframes heroFloat {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(1deg);
      }
    }

    .hero-animate {
      animation: heroFloat 10s ease-in-out infinite;
    }

    .brand-scroll-container {
      mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    }

    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-scroll {
      animation: scroll 40s linear infinite;
    }

    .squircle {
      border-radius: 3.5rem;
    }

    @media (max-width: 640px) {
      .squircle {
        border-radius: 2.25rem;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #aaa;
    }

    /* Book Styles */
    .book-shadow {
      box-shadow: 20px 20px 60px rgba(0, 0, 0, 0.3);
      transform-style: preserve-3d;
    }

    .page-turn-animation {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media print {

      /* Hide UI elements */
      header,
      footer,
      button,
      .no-print,
      .fixed {
        display: none !important;
      }

      /* Reset Container Styles for Print */
      body,
      .min-h-screen,
      .bg-\[\#e8e6e1\] {
        background: white !important;
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
      }

      /* Content specific */
      .book-page-container,
      section {
        box-shadow: none !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        background: white !important;
      }

      /* Typography for Print */
      p,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      li,
      span,
      div {
        color: #000 !important;
        text-shadow: none !important;
      }

      p {
        font-size: 12pt !important;
        line-height: 1.6 !important;
        orphans: 3;
        widows: 3;
      }

      /* Ensure gradients/backgrounds don't mess up print */
      .absolute {
        display: none !important;
      }

      /* Force page breaks */
      h2,
      h3 {
        page-break-before: always;
        page-break-after: avoid;
      }

      /* Running Header for Print (simulated via :before on body or section if needed, but simple is better) */
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4"
    }
  }
  </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="font-sans">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
