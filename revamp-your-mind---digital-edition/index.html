
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revamp Your Mind | Teresia Waithera Wanjiru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;600;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              emerald: {
                950: '#062d2d',
                900: '#064e3b',
              },
              gold: {
                400: '#f9e29b',
                500: '#d4af37',
                600: '#b8860b',
              }
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f2ee;
            scroll-behavior: smooth;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .font-body {
            font-family: 'Lora', serif;
        }
        .prose p {
            margin-bottom: 2rem;
            line-height: 2;
            color: #1a202c;
            font-size: 1.25rem;
            text-align: justify;
            hyphens: auto;
        }
        /* The Reading Page Effect */
        .book-page {
            background-color: #fcfbf7;
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            box-shadow: 
                0 30px 60px -12px rgba(0,0,0,0.1), 
                0 18px 36px -18px rgba(0,0,0,0.15),
                inset 20px 0 30px -20px rgba(0,0,0,0.05);
            border-radius: 4px;
            position: relative;
        }
        .book-page::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(to right, rgba(0,0,0,0.1), transparent);
        }
        /* Drop Cap Styling */
        .chapter-content p:first-of-type::first-letter {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 5.5rem;
            float: left;
            line-height: 0.8;
            margin-right: 1rem;
            margin-top: 0.5rem;
            color: #b8860b;
        }
        .gradient-gold {
            background: linear-gradient(135deg, #d4af37 0%, #f9e29b 50%, #d4af37 100%);
        }
        .gold-text {
            color: #b8860b;
        }
        .section-accent {
            width: 100px;
            height: 2px;
            background: #d4af37;
            margin: 5rem auto;
            opacity: 0.5;
        }
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #064e3b;
            border-radius: 5px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .page-turn-animation {
            animation: pageTurn 0.6s ease-out;
        }
        @keyframes pageTurn {
            0% { transform: perspective(1000px) rotateY(10deg); opacity: 0; }
            100% { transform: perspective(1000px) rotateY(0deg); opacity: 1; }
        }
        .book-shadow {
          box-shadow: 25px 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
<script type="importmap">
