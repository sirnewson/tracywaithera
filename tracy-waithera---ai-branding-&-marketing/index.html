
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracy Waithera | AI Marketing & Personal Branding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      background-color: #ffffff;
      color: #09090b;
    }
    .gradient-text {
      background: linear-gradient(135deg, #ff6a00 0%, #b026ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-gradient {
      background: linear-gradient(90deg, #ff6a00 0%, #b026ff 100%);
    }
    .bg-magical {
      background: radial-gradient(circle at 50% 50%, rgba(255, 106, 0, 0.05) 0%, rgba(255, 255, 255, 1) 70%);
    }
    .bg-dark-magical {
      background: radial-gradient(circle at 50% 50%, rgba(176, 38, 255, 0.15) 0%, rgba(9, 9, 11, 1) 100%);
    }
    .pill-nav {
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 10px 30px -5px rgba(255, 106, 0, 0.3);
    }
    .splash-overlay {
      background: #ffffff;
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
    }
    .splash-overlay.hide {
      transform: translateY(-100%);
    }
    .netflix-scroll::-webkit-scrollbar {
      display: none;
    }
    .netflix-scroll {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    ::selection {
      background: #ff6a00;
      color: white;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .bg-grid {
      background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-grid-dark {
      background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
